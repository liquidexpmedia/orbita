<script type="text/javascript">
	const portrait = window.matchMedia("(orientation: portrait)").matches;
	

	window.matchMedia("(orientation: portrait)").addEventListener("change", e => {
    const portrait = e.matches;

    if (portrait) {
        //is portrait
         document.getElementById("textOrientation").style.display = 'block';

        document.getElementById("slider").classList.remove('fullScreen');
        document.getElementById("slider").classList.add('aspectwrapper');

    } else {
        // landscape
        document.getElementById("textOrientation").style.display = 'none';

        document.getElementById("slider").classList.remove('aspectwrapper');
        document.getElementById("slider").classList.add('fullScreen');
		

    }
});

</script>
